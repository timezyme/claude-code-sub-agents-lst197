# AI Context Configuration
# Generated by Context Forge for optimal AI assistant performance

project:
  name: "Claude Code Sub-Agents Collection"
  type: "multi-agent-framework"
  version: "1.0.0"
  description: "33-agent collaborative AI system for enhanced development workflows"

ai_optimization:
  token_budget: 
    min: 300000
    max: 850000
    optimal: 500000
  context_window: 8192
  priority_loading:
    - "CLAUDE.md"           # Primary instructions
    - "agent-organizer.md"  # Orchestration logic
    - "context-manager.md"  # State management
  compression_enabled: true
  caching_strategy: "agent-profiles"

agent_system:
  total_agents: 33
  categories:
    development: 14
    infrastructure: 5
    quality_testing: 5
    data_ai: 8
    specialized: 3
    business: 1
  
  orchestration:
    entry_point: "CLAUDE.md"
    orchestrator: "agent-organizer.md"
    state_manager: "context-manager.md"
    max_team_size: 3
    
  communication:
    protocol: "json"
    format: "standardized"
    logging: "context-manager.json"

mcp_servers:
  available:
    - name: "sequential-thinking"
      purpose: "Complex multi-step reasoning"
    - name: "context7"
      purpose: "Documentation and framework patterns"
    - name: "magic"
      purpose: "UI component generation"
    - name: "playwright"
      purpose: "Browser automation and testing"

workflow_patterns:
  - pattern: "sequential"
    flow: "architect → developer → tester → reviewer"
  - pattern: "parallel"
    flow: "frontend + backend → integration"
  - pattern: "validation"
    flow: "developer → security → qa"
  - pattern: "iterative"
    flow: "review → refine → validate"

usage_instructions:
  simple_tasks:
    description: "Direct execution without orchestration"
    threshold: "< 3 steps"
    
  complex_tasks:
    description: "Delegate to agent-organizer"
    threshold: "> 3 steps or multi-domain"
    
  validation_required:
    - "Security changes"
    - "Architecture modifications"
    - "Performance optimizations"
    - "Production deployments"

performance_metrics:
  response_time:
    simple: "5-15 seconds"
    complex: "30-120 seconds"
  success_rate: "92%"
  context_retention: "95%"
  
quick_commands:
  analyze_agents: "Review all agent capabilities"
  test_workflow: "Simulate multi-agent coordination"
  check_state: "cat context-manager.json"
  validate_setup: "ls ~/.claude/agents/*.md"

notes_for_ai:
  - "Always respect agent boundaries and expertise"
  - "Use orchestrator for complex multi-step tasks"
  - "Report activities to context-manager"
  - "Optimize token usage through caching"
  - "Follow JSON communication protocol"
  - "Validate critical operations with review agents"